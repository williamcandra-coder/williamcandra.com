<!DOCTYPE html>
<!-- rage-wings.html · v6.6 · After Hours · williamcandra.com -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#161419">
<title>RAGE WINGS — After Hours</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=JetBrains+Mono:wght@500&display=swap');
:root{--bezel:#0d0c10;--screen:#161419;--paper:#f2ede3;--cream:#f2d4ae;--muted:#8a8790;
  --accent:#e8462f;--comment:#5f7a6a;--dim:#546358;--panel:#241f2b;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:#08070a;overscroll-behavior-y:contain;}
body{font-family:'JetBrains Mono',monospace;color:var(--paper);user-select:none;-webkit-user-select:none;}

#stage{position:relative;width:100%;height:100vh;height:100dvh;overflow:hidden;}
#game{position:absolute;inset:0;width:100%;height:100%;display:block;image-rendering:pixelated;touch-action:none;z-index:1;}

/* ===== HUD BAR (playing) ===== */
#hud{position:absolute;z-index:6;left:0;right:0;top:0;display:flex;align-items:center;gap:10px;
  padding:calc(env(safe-area-inset-top,0px) + 10px) calc(env(safe-area-inset-right,0px) + 12px) 10px calc(env(safe-area-inset-left,0px) + 12px);
  background:linear-gradient(rgba(13,12,16,.72),rgba(13,12,16,0));
  opacity:0;pointer-events:none;transition:opacity .22s;}
#hud.on{opacity:1;pointer-events:auto;}
.hstat{font-family:'Press Start 2P',monospace;font-size:6px;letter-spacing:1px;color:var(--muted);
  display:flex;align-items:baseline;gap:5px;}
.hstat b{color:var(--paper);font-size:9px;}
.hstat.time b{color:var(--paper);}
#hud .sp{flex:1;}
/* ===== idle chrome ===== */
#chrome{position:absolute;z-index:9;top:calc(env(safe-area-inset-top,0px) + 12px);left:calc(env(safe-area-inset-left,0px) + 12px);transition:opacity .25s;}
#chrome.off{opacity:0;pointer-events:none;}
.back-link{display:inline-flex;align-items:center;gap:8px;text-decoration:none;padding:6px 11px 6px 6px;border-radius:999px;
  background:rgba(13,12,16,.62);border:1px solid #2f2a38;-webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px);}
.back-link img{width:22px;height:22px;display:block;image-rendering:pixelated;border-radius:50%;flex-shrink:0;}
.back-link span{font-family:'Press Start 2P',monospace;font-size:7px;letter-spacing:1px;color:var(--muted);line-height:1;padding-top:1px;}
.back-link:active{background:#2f2a38;border-color:#4a4458;}
.back-link:active span{color:var(--paper);}
#bestchip{position:absolute;z-index:9;top:calc(env(safe-area-inset-top,0px) + 12px);right:calc(env(safe-area-inset-right,0px) + 12px);
  font-family:'Press Start 2P',monospace;font-size:7px;letter-spacing:1px;color:var(--muted);
  background:rgba(13,12,16,.62);border:1px solid #2a2731;border-radius:999px;padding:8px 12px;transition:opacity .25s;}
#bestchip.off{opacity:0;}
#bestchip b{color:var(--cream);}

/* ===== overlay ===== */
#ov{position:absolute;inset:0;z-index:7;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;
  text-align:center;padding:16px calc(env(safe-area-inset-right,0px) + 18px) 16px calc(env(safe-area-inset-left,0px) + 18px);
  background:radial-gradient(ellipse at center, rgba(13,12,16,.66) 0%, rgba(13,12,16,.93) 78%);transition:opacity .22s;}
#ov.hide{opacity:0;pointer-events:none;}
#title{position:relative;display:inline-block;font-family:'Press Start 2P',monospace;
  font-size:clamp(14px,4.6vw,22px);line-height:1.5;color:var(--cream);letter-spacing:3px;margin:0;
  text-shadow:0 0 10px rgba(242,212,174,.35);animation:cafeGlow 5s ease-in-out infinite;}
@keyframes cafeGlow{0%,100%{opacity:.84;text-shadow:0 0 6px rgba(242,212,174,.22);}50%{opacity:1;text-shadow:0 0 11px rgba(242,212,174,.45),0 0 24px rgba(242,212,174,.2);}}
#mock{font-family:'JetBrains Mono',monospace;font-size:clamp(11px,3.4vw,14px);color:var(--comment);margin:18px 0 34px;max-width:20em;line-height:1.5;min-height:1.5em;}
#hero{display:block;width:96px;height:96px;image-rendering:pixelated;margin:0 0 30px;}
#hero.off{display:none;}
@keyframes tapBob{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
.scoreline{display:none;align-items:flex-end;justify-content:center;gap:22px;margin:0 0 26px;}
.scoreline.on{display:flex;}
.scoreline div{display:flex;flex-direction:column;align-items:center;gap:6px;}
.scoreline .k{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--muted);letter-spacing:1px;}
.scoreline .v{font-family:'Press Start 2P',monospace;font-size:clamp(14px,4.2vw,17px);color:var(--cream);}
.scoreline .v.new{color:var(--accent);}
#newbest{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--accent);letter-spacing:2px;display:none;animation:blink 1s steps(1) infinite;}
#newbest.on{display:block;}
@keyframes blink{50%{opacity:0;}}
.btn{font-family:'Press Start 2P',monospace;font-size:8px;line-height:1.3;color:var(--bezel);background:var(--accent);
  border:none;padding:10px 22px;border-radius:5px;letter-spacing:1px;box-shadow:0 3px 0 #a3301f;cursor:pointer;}
.btn:active{transform:translateY(3px);box-shadow:0 1px 0 #a3301f;}
.btn.ghost{background:transparent;color:var(--accent);border:2px solid var(--accent);box-shadow:none;}
.btn.ghost:active{background:var(--accent);color:var(--bezel);transform:translateY(2px);}
#quick{display:flex;align-items:center;justify-content:center;gap:clamp(4px,1.6vw,8px);flex-wrap:wrap;max-width:min(360px,calc(100vw - 20px));margin-top:30px;}
#quick.off{display:none;}
.qc{width:clamp(42px,13vw,52px);height:clamp(42px,13vw,52px);border-radius:9px;background:rgba(36,31,43,.75);border:2px solid #2f2a38;
  display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0;transition:border-color .15s,transform .12s;}
.qc canvas{width:clamp(29px,9vw,36px);height:clamp(29px,9vw,36px);image-rendering:pixelated;display:block;}
.qc.sel{border-color:var(--cream);transform:translateY(-2px);box-shadow:0 0 10px rgba(242,212,174,.28);}
#quickName{font-family:'Press Start 2P',monospace;font-size:7px;letter-spacing:1px;color:var(--muted);min-height:1em;margin-top:12px;}

#scrollCue{position:absolute;left:0;right:0;bottom:calc(env(safe-area-inset-bottom,0px) + 10px);z-index:6;text-align:center;
  font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim);pointer-events:none;animation:tapBob 2.4s ease-in-out infinite;}
#scrollCue.off{opacity:0;}
#flash{position:absolute;inset:0;z-index:9;background:var(--paper);opacity:0;pointer-events:none;}
.ver{position:absolute;z-index:10;right:calc(env(safe-area-inset-right,0px) + 8px);bottom:calc(env(safe-area-inset-bottom,0px) + 6px);
  font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--dim);opacity:.5;pointer-events:none;}

/* ===== gallery ===== */
#gallery{padding:44px 18px 60px;background:linear-gradient(#0b0a0d,#08070a);}
#gallery h2{font-family:'Press Start 2P',monospace;font-size:11px;color:var(--muted);letter-spacing:3px;text-align:center;margin:0 0 6px;}
#gallery .sub{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--comment);text-align:center;margin:0 0 30px;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;max-width:780px;margin:0 auto;}
.card{background:#12111a;border:2px solid var(--panel);border-radius:12px;padding:16px 12px;text-align:center;cursor:pointer;transition:border-color .15s,transform .12s;}
.card:active{transform:translateY(-2px);}
.card.sel{border-color:var(--cream);box-shadow:0 0 16px rgba(242,212,174,.18);}
.card canvas{width:76px;height:76px;image-rendering:pixelated;display:block;margin:0 auto 10px;}
.card .nm{font-family:'Press Start 2P',monospace;font-size:9px;color:var(--paper);letter-spacing:1px;margin-bottom:5px;}
.card.sel .nm{color:var(--cream);}
.card .wd{font-family:'Press Start 2P',monospace;font-size:6px;color:var(--cream);letter-spacing:1px;margin-bottom:7px;}
.card .ds{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--comment);line-height:1.45;min-height:2.9em;}
.card .bs{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--muted);margin-top:9px;letter-spacing:1px;}
.card .bs b{color:var(--cream);}
#backTop{display:block;margin:34px auto 0;font-family:'Press Start 2P',monospace;font-size:9px;color:var(--accent);
  background:transparent;border:2px solid var(--accent);border-radius:6px;padding:13px 20px;cursor:pointer;letter-spacing:1px;}
@media (prefers-reduced-motion: reduce){#title,#newbest,#tapHint .arw,#tapHint .hand,#scrollCue{animation:none !important;}}
</style>
</head>

  var im=g.getImageData(0,0,W0,H0).data,mnx=1e9,mxx=-1,mny=1e9,mxy=-1;
  for(var y=0;y<H0;y++)for(var x=0;x<W0;x++){var k=((y*W0+x)<<2);

function drawTile(g,tile,x,baseY,unit,pal){
  var h=tile.length, w=tile[0].length;
  for(var r=0;r<h;r++){
    var row=tile[r];
    for(var cIdx=0;cIdx<row.length;cIdx++){
      var ch=row[cIdx]; if(ch==='.')continue;
      var col=pal[ch]; if(!col)continue;
      g.fillStyle=col;
      g.fillRect(Math.round(x+cIdx*unit), Math.round(baseY-(h-r)*unit),
                 Math.ceil(unit), Math.ceil(unit));
    }
  }
  return w*unit;
}

var twk=[],mot=[],fish=[],beacon=null,shoot=null,shootIn=0;
function buildAmbient(){
  var c=CH,baseY=H-GROUND_H;
  twk=[];var tn=Math.max(18,Math.round(W/26));
  for(var i=0;i<tn;i++)twk.push({x:Math.random()*W,y:Math.random()*baseY*.66,
    r:Math.max(1,Math.round(S*(Math.random()<.28?1.9:1.1))),p:Math.random()*6.283,sp:.5+Math.random()*1.6});
  mot=[];var a=c.amb,mn=(a==='redlantern')?7:(a==='firefly')?16:(a==='torch')?8:(a==='bubble')?18:4;
  for(var j=0;j<mn;j++)mot.push({x:Math.random()*W,y:Math.random()*baseY*.9,
    r:Math.max(2,Math.round(S*(a==='firefly'?2:3))),p:Math.random()*6.283,
    vy:-(0.04+Math.random()*.12)*S,dr:(Math.random()-.5)*.26*S});
  beacon=(c.amb==='beacon')?{x:W*(.18+Math.random()*.62),y:baseY-(72+Math.random()*44)*S}:null;
  fish=[];
  if(c.amb==='bubble'){ for(var f=0;f<9;f++) fish.push({x:Math.random()*W,y:baseY*(.15+Math.random()*.6),
      sp:(0.5+Math.random()*1.1)*S, sz:Math.max(3,(3+Math.random()*3)*S), p:Math.random()*6.28,
      col:['#e8a04a','#9ad84a','#f2d4ae'][Math.floor(Math.random()*3)]}); }
  shoot=null;shootIn=4000+Math.random()*9000;
}
function drawAmbient(t,dt){
  var c=CH,baseY=H-GROUND_H,a=c.amb;
  ctx.fillStyle=c.starHi;
  for(var i=0;i<twk.length;i++){var s=twk[i],al=.18+.82*Math.abs(Math.sin(t/820*s.sp+s.p));
    ctx.globalAlpha=al;ctx.fillRect(s.x|0,s.y|0,s.r,s.r);
    if(al>.87){ctx.globalAlpha=al*.5;ctx.fillRect((s.x-s.r)|0,s.y|0,s.r,s.r);ctx.fillRect((s.x+s.r)|0,s.y|0,s.r,s.r);
      ctx.fillRect(s.x|0,(s.y-s.r)|0,s.r,s.r);ctx.fillRect(s.x|0,(s.y+s.r)|0,s.r,s.r);}}
  ctx.globalAlpha=1;
  for(var m=0;m<mot.length;m++){var o=mot[m];
    o.y+=o.vy*dt*.06;o.x+=Math.sin(t/1400+o.p)*o.dr;
    if(o.y<-12){o.y=baseY*.95;o.x=Math.random()*W;}
    if(o.x<-12)o.x=W+8; if(o.x>W+12)o.x=-8;
    var pu=.45+.55*Math.abs(Math.sin(t/900+o.p));
    if(a==='lantern'||a==='redlantern'||a==='torch'){
      var col=(a==='redlantern')?'#e8462f':(a==='torch')?'#e8a04a':'#ffc46e';
      ctx.globalAlpha=pu*.26;ctx.fillStyle=col;ctx.fillRect((o.x-o.r*1.5)|0,(o.y-o.r*1.5)|0,o.r*4,o.r*4);
      ctx.globalAlpha=pu;ctx.fillRect(o.x|0,o.y|0,o.r,o.r*1.3);
    } else if(a==='firefly'){
      ctx.globalAlpha=pu*.85;ctx.fillStyle='#b8e986';ctx.fillRect(o.x|0,o.y|0,o.r,o.r);
      ctx.globalAlpha=pu*.22;ctx.fillRect((o.x-o.r)|0,(o.y-o.r)|0,o.r*3,o.r*3);
    } else if(a==='bubble'){
      ctx.globalAlpha=.30;ctx.strokeStyle='rgba(200,245,250,.7)';ctx.lineWidth=Math.max(1,S);
      ctx.strokeRect((o.x)|0,(o.y)|0,o.r,o.r);
      ctx.globalAlpha=.14;ctx.fillStyle='rgba(220,250,255,.9)';ctx.fillRect(o.x|0,o.y|0,o.r,o.r);
    } else { ctx.globalAlpha=pu*.4;ctx.fillStyle=c.win;ctx.fillRect(o.x|0,o.y|0,o.r,o.r); }}
  ctx.globalAlpha=1;
  for(var fi=0;fi<fish.length;fi++){var fh=fish[fi];
    fh.x+=fh.sp*dt*.06; fh.y+=Math.sin(t/900+fh.p)*.25*S;
    if(fh.x>W+40){fh.x=-40;fh.y=baseY*(.15+Math.random()*.6);}
    var kind=FISH_KIND[fi%FISH_KIND.length];
    var fu=Math.max(1,Math.round((kind==='school'?0.62:0.58)*S*(fh.sz/(4*S))));
    drawFishSpr(ctx,kind,fh.x,fh.y,fu,kind==='school'?.55:.9);}
  ctx.globalAlpha=1;
  if(beacon&&Math.sin(t/520)>.55){ctx.globalAlpha=.2;ctx.fillStyle='#e8462f';
    ctx.fillRect((beacon.x-5*S)|0,(beacon.y-5*S)|0,10*S,10*S);ctx.globalAlpha=.95;
    ctx.fillRect(beacon.x|0,beacon.y|0,Math.max(2,3*S),Math.max(2,3*S));ctx.globalAlpha=1;}
  shootIn-=dt;
  if(shootIn<=0&&!shoot&&CH.amb!=='bubble'){shoot={x:Math.random()*W*.6,y:Math.random()*baseY*.3,vx:(3.2+Math.random()*2)*S,vy:(1.1+Math.random())*S,life:1};shootIn=7000+Math.random()*14000;}
  if(shoot){shoot.x+=shoot.vx*dt*.06;shoot.y+=shoot.vy*dt*.06;shoot.life-=dt*.0011;
    if(shoot.life<=0||shoot.x>W+40)shoot=null;
    else{ctx.fillStyle=c.starHi;for(var q=0;q<7;q++){ctx.globalAlpha=Math.max(0,shoot.life*(1-q/7));
      ctx.fillRect((shoot.x-shoot.vx*q*2)|0,(shoot.y-shoot.vy*q*2)|0,Math.max(1,2*S-q*.2),Math.max(1,2*S-q*.2));}ctx.globalAlpha=1;}}
}

function mockLine(s,b,isNew){

  if(s===0)return 'zero. you flapped once and gave up.';
  if(s===1)return 'one pipe. congratulations, i guess.';
  if(lastScore!==null&&s===lastScore)return 'exactly '+s+' again. that is a habit now.';
  if(lastScore!==null&&s<lastScore)return 'worse than last time. '+lastScore+' \u2192 '+s+'.';
  if(b>0&&s<b*.4)return 'best: '+b+'. today: '+s+'. what happened.';
  if(s<5)return 'pipe '+(s+1)+' got you. again.';
  if(s<12)return 'okay. you can nearly play this.';
  if(s<25)return 'respectable. the uncle says nothing.';
  return s+'. go to sleep, william.';
}

/* ============ characters UI ============ */
var icons=[];
function makeIcon(c,w,h){var cn=document.createElement('canvas');cn.width=w;cn.height=h;icons.push({cv:cn,c:c,p:Math.random()*6.28});return cn;}
CHARS.forEach(function(c){
  var b=document.createElement('button');b.className='qc';b.dataset.id=c.id;b.appendChild(makeIcon(c,36,36));
  b.addEventListener('click',function(e){e.stopPropagation();applyChar(c);});quick.appendChild(b);
  var card=document.createElement('div');card.className='card';card.dataset.id=c.id;
  card.appendChild(makeIcon(c,76,76));
  var nm=document.createElement('div');nm.className='nm';nm.textContent=c.name;card.appendChild(nm);
  var wd=document.createElement('div');wd.className='wd';wd.textContent=c.world;card.appendChild(wd);
  var ds=document.createElement('div');ds.className='ds';ds.textContent=c.desc;card.appendChild(ds);
  var bs=document.createElement('div');bs.className='bs';bs.innerHTML='BEST <b>'+getBest(c.id)+'</b>';card.appendChild(bs);
  card.addEventListener('click',function(){applyChar(c);window.scrollTo({top:0,behavior:'smooth'});});
  grid.appendChild(card);
});
function drawHero(t){
  if(!hero||hero.classList.contains('off'))return;
  var g=hero.getContext('2d');
  g.clearRect(0,0,hero.width,hero.height);
  var u=Math.max(2,Math.round(1.7*S));      // EXACTLY the in-game size
  g.save();
  g.translate(hero.width/2, Math.round(hero.height/2 + Math.sin(t/430)*u*0.8));
  drawChar(g,CH,u,Math.sin(t/200)>0,CH.id);
  g.restore();
}
function drawIcons(t){for(var i=0;i<icons.length;i++){var it=icons[i],g=it.cv.getContext('2d');
  g.clearRect(0,0,it.cv.width,it.cv.height);var u=Math.max(1,Math.floor(it.cv.width/15));
  g.save();g.translate(it.cv.width/2,it.cv.height/2);g.translate(0,Math.sin(t/380+it.p)*u*.7);
  drawChar(g,it.c,u,Math.sin(t/220+it.p)>0,it.c.id);g.restore();}}
function applyChar(c){
  CH=c;try{localStorage.setItem('wc-rw-char',c.id);}catch(e){}
  bestVal.textContent=getBest(c.id);ovBest.textContent=getBest(c.id);hBest.textContent=getBest(c.id);quickName.textContent=c.name+' \u2022 '+c.world;
  [].forEach.call(quick.children,function(el){el.classList.toggle('sel',el.dataset.id===c.id);});
  [].forEach.call(grid.children,function(el){el.classList.toggle('sel',el.dataset.id===c.id);});
  resize();showReady();
}
function showReady(){
  state='ready';titleEl.textContent=CH.name;
  scoreline.classList.remove('on');newbest.classList.remove('on');
  hero.classList.remove('off');quick.classList.remove('off');
  mockEl.textContent=mockLine(lastScore,getBest(CH.id),false);
  startBtn.textContent='PRESS PLAY';
  ovEl.classList.remove('hide');chromeEl.classList.remove('off');bestchip.classList.remove('off');
  hud.classList.remove('on');scrollCue.classList.remove('off');
}

/* ============ input ============ */
function flap(){if(state==='ready'){startGame();return;}if(state!=='playing')return;bird.v=FLAP;flapAnim=1;}
function startGame(){reset();state='playing';runMs=0;
  ovEl.classList.add('hide');chromeEl.classList.add('off');bestchip.classList.add('off');
  hud.classList.add('on');scrollCue.classList.add('off');}
function die(){
  if(state!=='playing')return;state='dead';deadAt=performance.now();shake=REDUCE?0:14*S;
  if(!REDUCE){flash.style.transition='none';flash.style.opacity='.5';
    requestAnimationFrame(function(){flash.style.transition='opacity .3s';flash.style.opacity='0';});
    for(var i=0;i<14;i++)bits.push({x:BIRD_X,y:bird.y,vx:(Math.random()-.5)*5*S,vy:(Math.random()-.9)*4.5*S,
      r:Math.max(1,(1.6+Math.random()*2.2)*S),a:1});}
  try{if(navigator.vibrate)navigator.vibrate(38);}catch(e){}
  var b=getBest(CH.id),isNew=score>b;if(isNew){setBest(CH.id,score);b=score;}
  hud.classList.remove('on');
  titleEl.textContent='GAME OVER';scoreline.classList.add('on');hero.classList.add('off');
  ovScore.textContent=score;ovBest.textContent=b;ovTime.textContent=fmtTime(runMs);bestVal.textContent=b;hBest.textContent=b;
  ovScore.classList.toggle('new',isNew);newbest.classList.toggle('on',isNew);
  mockEl.textContent=mockLine(score,b,isNew);lastScore=score;startBtn.textContent='FLAP AGAIN';
  [].forEach.call(grid.children,function(el){if(el.dataset.id===CH.id)el.querySelector('.bs').innerHTML='BEST <b>'+b+'</b>';});
  setTimeout(function(){ovEl.classList.remove('hide');chromeEl.classList.remove('off');
    bestchip.classList.remove('off');scrollCue.classList.remove('off');},240);
}
function onTap(e){
  if(e&&e.target&&e.target.closest&&e.target.closest('a,button,#gallery,#hud'))return;
  if(window.scrollY>10)return;
  if(e&&e.cancelable)e.preventDefault();
  if(state==='dead'){if(performance.now()-deadAt<550)return;showReady();startGame();return;}
  flap();
}
stage.addEventListener('touchstart',onTap,{passive:false});
stage.addEventListener('mousedown',onTap);
window.addEventListener('keydown',function(e){
  if(e.code==='Space'||e.key===' '||e.key==='ArrowUp'){e.preventDefault();onTap(null);}
});
startBtn.addEventListener('click',function(e){e.preventDefault();e.stopPropagation();
  if(state==='dead'&&performance.now()-deadAt<550)return;showReady();startGame();});
$('backTop').addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'});});

/* ============ update ============ */
function update(dt){
  var k=dt*.06;
  if(!REDUCE)flapAnim=Math.max(0,flapAnim-dt*.006);
  if(state==='playing'){
    runMs+=dt; hTime.textContent=fmtTime(runMs);
    bird.v=Math.min(bird.v+GRAV*k,MAXFALL);bird.y+=bird.v*k;
    bird.rot=Math.max(-1,Math.min(1,bird.v/(MAXFALL*.85)))*.9;
    if(CH.phys.drift)driftT+=dt*.0012;
    for(var i=0;i<pipes.length;i++){var p=pipes[i];p.x-=PIPE_SPEED*k;
      if(!p.passed&&p.x+PIPE_W<BIRD_X-BIRD_R){p.passed=true;score++;hScore.textContent=score;
        try{if(navigator.vibrate)navigator.vibrate(8);}catch(e){}}
      if(p.x+PIPE_W<-PIPE_W){var mx=0;for(var j=0;j<pipes.length;j++)if(pipes[j].x>mx)mx=pipes[j].x;
        pipes[i]=makePipe(mx+PIPE_SPACE);}}
    var bx=BIRD_X+(CH.phys.drift?Math.sin(driftT)*W*.05:0);
    if(bird.y+BIRD_R>=H-GROUND_H){bird.y=H-GROUND_H-BIRD_R;die();}
    else if(bird.y-BIRD_R<=0){bird.y=BIRD_R;bird.v=0;}
    else for(var m=0;m<pipes.length;m++){var q=pipes[m];
      if(bx+BIRD_R>q.x&&bx-BIRD_R<q.x+PIPE_W){
        if(bird.y-BIRD_R<q.gapY-GAP/2||bird.y+BIRD_R>q.gapY+GAP/2){die();break;}}}
    groundX=(groundX-PIPE_SPEED*k)%(28*S);
    cloudX-=PIPE_SPEED*.07*k;farX-=PIPE_SPEED*.17*k;nearX-=PIPE_SPEED*.34*k;hillX-=PIPE_SPEED*.56*k;
  }else if(state==='ready'){
    bird.y=H*.42+Math.sin(performance.now()/380)*7*S;bird.rot=Math.sin(performance.now()/380)*.12;
    groundX=(groundX-PIPE_SPEED*.5*k)%(28*S);cloudX-=PIPE_SPEED*.03*k;
  }else if(state==='dead'){
    if(bird.y+BIRD_R<H-GROUND_H){bird.v=Math.min(bird.v+GRAV*k,MAXFALL);
      bird.y=Math.min(bird.y+bird.v*k,H-GROUND_H-BIRD_R);bird.rot=Math.min(bird.rot+.05*k,1.5);}}
  if(shake>0)shake=Math.max(0,shake-dt*.05);
  for(var f=bits.length-1;f>=0;f--){var ft=bits[f];ft.vy+=.22*S*k;ft.x+=ft.vx*k;ft.y+=ft.vy*k;ft.a-=.012*k;
    if(ft.a<=0)bits.splice(f,1);}
}

/* ============ pipes: banded body + capped ends ============ */
function pipeCol(x,y,w,h,st){
  if(h<=0)return;
  ctx.fillStyle=st.edge;  ctx.fillRect(Math.round(x-2*S),Math.round(y),Math.ceil(w+4*S),Math.ceil(h));
  ctx.fillStyle=st.body;  ctx.fillRect(Math.round(x),Math.round(y),Math.ceil(w),Math.ceil(h));
  ctx.fillStyle=st.light; ctx.fillRect(Math.round(x+w*.10),Math.round(y),Math.ceil(w*.16),Math.ceil(h));
  ctx.fillStyle=st.light2;ctx.fillRect(Math.round(x+w*.32),Math.round(y),Math.ceil(w*.09),Math.ceil(h));
  ctx.fillStyle=st.dark;  ctx.fillRect(Math.round(x+w*.70),Math.round(y),Math.ceil(w*.30),Math.ceil(h));
  /* vertical-only detail per style — no horizontal banding anywhere */
  if(st.style==='trunk'){ ctx.fillStyle='rgba(0,0,0,.18)';
    ctx.fillRect(Math.round(x+w*.24),Math.round(y),Math.max(1,1.5*S),Math.ceil(h));
    ctx.fillRect(Math.round(x+w*.52),Math.round(y),Math.max(1,1.5*S),Math.ceil(h)); }
  if(st.style==='column'){ ctx.fillStyle='rgba(0,0,0,.20)';
    ctx.fillRect(Math.round(x+w*.26),Math.round(y),Math.max(1,2*S),Math.ceil(h));
    ctx.fillRect(Math.round(x+w*.50),Math.round(y),Math.max(1,2*S),Math.ceil(h));
    ctx.fillStyle='rgba(255,255,255,.05)';
    ctx.fillRect(Math.round(x+w*.42),Math.round(y),Math.max(1,1.5*S),Math.ceil(h)); }
  if(st.style==='post'){ ctx.fillStyle='rgba(0,0,0,.20)';
    ctx.fillRect(Math.round(x+w*.44),Math.round(y),Math.max(1,2*S),Math.ceil(h)); }
  if(st.style==='kelp'){ ctx.fillStyle='rgba(0,0,0,.16)';
    ctx.fillRect(Math.round(x+w*.20),Math.round(y),Math.max(1,2*S),Math.ceil(h));
    ctx.fillStyle='rgba(160,220,190,.10)';
    ctx.fillRect(Math.round(x+w*.60),Math.round(y),Math.max(1,2*S),Math.ceil(h)); }
  if(st.style==='bamboo'){ ctx.fillStyle='rgba(255,255,255,.07)';
    ctx.fillRect(Math.round(x+w*.46),Math.round(y),Math.max(1,1.5*S),Math.ceil(h)); }
}
function pipeCap(x,y,w,h,st){
  var cx=x-4*S, cw=w+8*S;
  ctx.fillStyle=st.edge;  ctx.fillRect(Math.round(cx-2*S),Math.round(y),Math.ceil(cw+4*S),Math.ceil(h));
  ctx.fillStyle=st.cap;   ctx.fillRect(Math.round(cx),Math.round(y),Math.ceil(cw),Math.ceil(h));
  ctx.fillStyle=st.capL;  ctx.fillRect(Math.round(cx+cw*.08),Math.round(y),Math.ceil(cw*.15),Math.ceil(h));
  ctx.fillStyle=st.capD;  ctx.fillRect(Math.round(cx+cw*.74),Math.round(y),Math.ceil(cw*.26),Math.ceil(h));
  ctx.fillStyle=st.capL;  ctx.fillRect(Math.round(cx),Math.round(y),Math.ceil(cw),Math.max(2,2*S));
}
function drawPipe(p){
  var st=CH.pipe,lip=Math.max(9,13*S),topH=p.gapY-GAP/2,botY=p.gapY+GAP/2,baseY=H-GROUND_H;
  var oa=ctx.globalAlpha; if(CH.id==='ghost')ctx.globalAlpha=.9;
  pipeCol(p.x,0,PIPE_W,topH-lip,st);       pipeCap(p.x,topH-lip,PIPE_W,lip,st);
  pipeCol(p.x,botY+lip,PIPE_W,baseY-(botY+lip),st); pipeCap(p.x,botY,PIPE_W,lip,st);
  ctx.globalAlpha=oa;
}

/* ============ draw ============ */
function draw(){
  var c=CH,ox=0,oy=0;
  if(shake>0){ox=(Math.random()-.5)*shake;oy=(Math.random()-.5)*shake;}
  ctx.save();ctx.translate(ox,oy);
  var g=ctx.createLinearGradient(0,0,0,H-GROUND_H);
  g.addColorStop(0,c.sky[0]);g.addColorStop(.55,c.sky[1]);g.addColorStop(1,c.sky[2]);
  ctx.fillStyle=g;ctx.fillRect(-24,-24,W+48,H+48);
  blit(L.stars,0);blit(L.cloud,cloudX);blit(L.far,farX);blit(L.near,nearX);blit(L.hill,hillX);
  drawAmbient(performance.now(),lastDt);
  for(var p=0;p<pipes.length;p++)drawPipe(pipes[p]);
  ctx.fillStyle=c.ground;ctx.fillRect(0,H-GROUND_H,W,GROUND_H);
  ctx.fillStyle=c.gtop;ctx.fillRect(0,H-GROUND_H,W,Math.max(2,3*S));
  ctx.fillStyle=c.gtex;
  for(var gx=groundX;gx<W;gx+=28*S){ctx.fillRect(gx,H-GROUND_H+9*S,12*S,Math.max(2,2*S));
    ctx.fillRect(gx+16*S,H-GROUND_H+17*S,7*S,Math.max(1,2*S));}
  for(var f=0;f<bits.length;f++){var ft=bits[f];ctx.globalAlpha=Math.max(0,ft.a);
    ctx.fillStyle=c.body;ctx.fillRect(ft.x|0,ft.y|0,ft.r,ft.r);}
  ctx.globalAlpha=1;
  if(state!=='ready'){                     /* on the start screen the hero canvas shows the bird */
  var bx=BIRD_X+(state==='playing'&&c.phys.drift?Math.sin(driftT)*W*.05:0);
  ctx.save();ctx.translate(bx,bird.y);ctx.rotate(bird.rot*.55);
  if(c.id==='ghost')ctx.globalAlpha=.84;
  drawChar(ctx,c,Math.max(2,Math.round(1.7*S)),flapAnim>.5,c.id);
  ctx.restore();}
  ctx.restore();
}

/* ============ loop ============ */
var last=performance.now(),lastDt=16;
function frame(now){var dt=Math.min(now-last,34);last=now;lastDt=dt;
  update(dt);draw();drawIcons(now);drawHero(now);requestAnimationFrame(frame);}
window.addEventListener('resize',resize,{passive:true});
window.addEventListener('orientationchange',function(){setTimeout(resize,120);});
applyChar(CH);requestAnimationFrame(frame);
})();
</script>
